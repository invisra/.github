<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Invisra Labs banner</title>
  <desc id="desc">Dark blueprint grid with the Invisra arrow mark and tagline.</desc>
  <defs>
    <pattern id="small-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.08" />
    </pattern>
    <pattern id="large-grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="url(#small-grid)" />
      <path d="M 120 0 L 0 0 0 120" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.12" />
    </pattern>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.22" />
      <stop offset="55%" stop-color="#60a5fa" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="#020617" />
  <rect width="1200" height="300" fill="url(#large-grid)" />
  <circle cx="600" cy="132" r="165" fill="url(#glow)" />
  <path d="M600 34 556 166 574 187 600 248 626 187 644 166Z M600 102 620 161 600 182 580 161Z" fill="#60a5fa" />
  <text x="600" y="266" text-anchor="middle" fill="#bfdbfe" font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace" font-size="16" letter-spacing="3.5">
    UNSEEN INFRASTRUCTURE FOR MODERN INVENTORS
  </text>
</svg>
